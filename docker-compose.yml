version: '3.8'

services:
  form2257:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: form2257-app
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Storage__BasePath=/app/data
      - RateLimiting__Enabled=true
      - RateLimiting__RequestsPerWindow=100
      - RateLimiting__WindowSizeInSeconds=60
    volumes:
      - form2257-data:/app/data
      - form2257-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  form2257-data:
    driver: local
  form2257-logs:
    driver: local

networks:
  default:
    name: form2257-network
